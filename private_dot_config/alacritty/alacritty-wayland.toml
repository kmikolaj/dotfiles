[bell]
animation = "EaseOutExpo"
color = "#ffffff"
duration = 1

[font]
size = 10.0

[font.bold]
family = "IosevkaTerm NFM"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "IosevkaTerm NFM"

[font.normal]
family = "IosevkaTerm NFM"

[keyboard]
bindings = [
  { action = "Copy", key = "Copy", mods = "Super" },
  { action = "Paste", key = "Paste", mods = "Super" },
  { action = "Paste", key = "Insert", mods = "Shift" },
  { key = 82, chars = "\u001B[2~" },
]

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = false

[general]
import = ["/home/kuba/.config/alacritty/themes/themes/solarized_dark.toml"]
